{% extends 'core/base.html' %}

{% block content %}

<div class="max-w-md mx-auto mt-16 bg-white border border-zinc-100 rounded-3xl shadow-sm p-8">

    <h1 class="text-3xl font-bold mb-2">Change Password</h1>

    <p class="text-zinc-500 mb-6">
        Enter your old password and choose a new one.
    </p>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}

        <button
            type="submit"
            class="w-full bg-black text-white py-3 rounded-xl hover:bg-zinc-800 transition"
        >
            Change Password
        </button>
    </form>

</div>

{% endblock %}
